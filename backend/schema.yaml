components:
  schemas:
    DashboardSummary:
      type: object
      properties:
        leads_total:
          type: integer
        leads_new:
          type: integer
        deals_active:
          type: integer
        deals_won:
          type: integer
        pipeline_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        won_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        conversion_rate:
          type: number
          format: double
        avg_check:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - avg_check
      - conversion_rate
      - deals_active
      - deals_won
      - leads_new
      - leads_total
      - pipeline_amount
      - won_amount
    Deal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        client_id:
          type: integer
          maximum: 2147483647
          minimum: 0
        lead_id:
          type: integer
          nullable: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        currency:
          type: string
          maxLength: 10
        stage:
